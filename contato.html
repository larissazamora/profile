<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="stylesheet" href="comum.css">
    <link rel="stylesheet" href="contato-style.css">
    <script src="java-script.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULÁRIO</title>
</head>

<body>
    
    <header class="cabecalho">
        <nav class="cabecalho-icones">
            <img src="./icones/logo.png" alt="logo"></img>
            
                <div >
                    <a href="index.html"><strong>Início</strong></a>
                    <a href="contato.html"><strong>Contato</strong></a>
                </div>
            
        </nav>
    </header>
    <main class="secao-principal">
        <section class="secao-principal-cabecalho">
            <h1>Contate-me</h1>
            <label>Preencha o formulário e envie</label>

        </section>
        <form class="formulario secao-principal-conteudo">
            <div>
                <label for="nome">Nome Completo: <span class="obrigatorio">*</span></label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo">
                <span id="nomeError" class="error"></span>

                <label for="email">E-mail: <span class="obrigatorio">*</span></label>
                <input type="email" id="email" name="'email" placeholder="Insira um e-mail válido">
                <span id="emailError" class="error"></span>

                <label for="assunto">Assunto: <span class="obrigatorio">*</span></label>
                <input type="text" id="assunto" name="assunto" placeholder="Digite o assunto">
                <span id="assuntoError" class="error"></span>

                <label for="mensagem">Mensagem: <span class="obrigatorio">*</span></label>
                <textarea id="mensagem" name="mensagem" placeholder="Deixe aqui sua mensagem" ></textarea>

                <p id="mensagemSucesso" class="sucesso">Enviado com sucesso!</p>
                    
            </div>

            <button class="botao-enviar-formulario botao-padrao" type="submit" onclick="return  validarFormulario()" >
                <strong>
                    ENVIAR
                </strong>
            </button>
            <p id="mensagem"></p>
            <small class="campos-obrigatorio">* Os campos marcados com asterisco são obrigatórios.</small>
        </form>
    </main>

    <footer class="rodape">
        <p>&copy; Larissa - Todos os direitos reservados.</p>
    </footer>

</body>

</html>
